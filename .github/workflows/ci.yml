name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine # keep in sync with docker-compose.yml
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: warwright_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r lint
      - run: pnpm -r test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/warwright_test

      # Mechanical proof of the Phase 3 DoD's "Foundry CI accepts a valid
      # sample Behavior": run the real gate CLI against the committed valid
      # submissions and require exit 0 (stages 1-3, including the seed
      # gauntlet). Rejections (a deliberately invalid submission) are
      # already proven by the foundry vitest suite above (packages/foundry/
      # src/validate.test.ts + cli-e2e.test.ts), which pnpm -r test just ran.
      - run: pnpm foundry:validate packages/foundry/submissions/sample-aggro

      - run: pnpm build

      # The gym-bridge's dist/main.js (built above) is what the Python
      # client spawns, so this must run after `pnpm build`, not before.
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          working-directory: gym
          python-version: '3.12'

      - run: uv sync --group train
        working-directory: gym
      - run: uv run ruff check .
        working-directory: gym
      - run: uv run pytest
        working-directory: gym
