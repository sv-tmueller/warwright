name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine # keep in sync with docker-compose.yml
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: warwright_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r lint
      - run: pnpm -r test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/warwright_test
      - run: pnpm build

      # The gym-bridge's dist/main.js (built above) is what the Python
      # client spawns, so this must run after `pnpm build`, not before.
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          working-directory: gym
          python-version: '3.9'

      - run: uv sync
        working-directory: gym
      - run: uv run ruff check .
        working-directory: gym
      - run: uv run pytest
        working-directory: gym
