[project]
name = "warwright-gym"
version = "0.1.0"
description = "Stdlib-only Python client for the Warwright batched gym bridge (#63)."
requires-python = ">=3.9"
dependencies = []

[dependency-groups]
dev = ["pytest>=8.0", "ruff>=0.6"]

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
# UP is limited by target-version = py39 above, so it never suggests 3.10+
# syntax (no `X | Y` unions, no `match` statements).

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["warwright_gym"]
